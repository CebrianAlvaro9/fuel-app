<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24"
  className="w-6 h-6 shrink-0"
>
  {/* Base del surtidor (Gris oscuro) */}
  <path
    d="M3 22h14v-1a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v1z"
    className="fill-slate-600"
  />

  {/* Cuerpo principal del surtidor (Verde relleno) */}
  <rect
    x="5" y="3" width="10" height="18" rx="2"
    className="fill-emerald-500"
  />

  {/* Marco de la pantalla (Gris muy oscuro) */}
  <rect
    x="7" y="6" width="6" height="5" rx="1"
    className="fill-slate-800"
  />

  {/* Cristal de la pantalla (Blanco/Verde clarito) */}
  <rect
    x="8" y="7" width="4" height="3" rx="0.5"
    className="fill-emerald-50"
  />

  {/* Manguera (Línea gris gruesa) */}
  <path
    d="M15 14h2a3 3 0 0 1 3 3v2a2 2 0 0 0 4 0V11.5l-2-2.5"
    fill="none"
    strokeWidth="2.5"
    strokeLinecap="round"
    strokeLinejoin="round"
    className="stroke-slate-400"
  />

  {/* Mango de la boquilla (Gris oscuro relleno) */}
  <path
    d="M20.5 6.5l1.5 2.5v3.5h-3V9L20.5 6.5z"
    className="fill-slate-600"
  />

  {/* Punta metálica de la boquilla */}
  <path
    d="M20.5 6.5L19 4.5 20.5 4l1.5 2.5-1.5 0z"
    className="fill-slate-400"
  />
</svg>
